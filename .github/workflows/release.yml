name: Release

# Pushing a `vX.Y.Z` tag is the only ship action: this workflow runs unit
# tests, builds sdist + wheel, publishes to PyPI, and creates a GitHub
# Release (with the dist files attached) in one motion. Title and body
# are bare (just the tag name + auto-generated commit list); run
# `gh release edit vX.Y.Z` afterwards if you want a hand-curated title
# and body like the v0.2 / v0.3 / v0.4 ones.
#
# Failure recovery: if `uv publish` succeeds but `gh release create`
# fails (rare, e.g. transient GitHub API), don't re-push the tag --
# `uv publish` would reject the duplicate upload. Run `gh release
# create vX.Y.Z --generate-notes dist/*` manually to finish the job.

on:
  push:
    tags:
      - 'v*'

# Creating a release writes to the repo's releases collection; the
# default-issued GITHUB_TOKEN needs that permission explicitly.
permissions:
  contents: write

# Two pushes of the same tag (or a tag move + repush) shouldn't fight
# each other on PyPI uploads.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `gh release create --generate-notes` can
          # diff against the previous tag for the auto-notes body.
          fetch-depth: 0

      - name: Install uv (with Python)
        uses: astral-sh/setup-uv@v5
        with:
          # Tests run on 3.13 (current head). The wheel is `py3-none-any`
          # so it installs on every supported version; per-push CI (when
          # added) should cover the full 3.12 - 3.14 matrix.
          python-version: "3.13"
          # The project does not commit `uv.lock` (library-style: consumers
          # decide their lockfile). Without an explicit dependency glob the
          # setup-uv cache silently never invalidates; pin it to
          # pyproject.toml so the cache key tracks dependency changes.
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra all --extra dev

      - name: Run unit tests
        # Unit tests only -- integration tests need a Postgres container
        # and belong in a separate CI workflow on every push / PR.
        # Treat this as a release safety net, not full CI.
        run: uv run pytest tests/unit -q

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        # Token-based publishing for now; switching to PyPI trusted
        # publishing later just means dropping `UV_PUBLISH_TOKEN`,
        # adding `permissions: id-token: write` to this job, and
        # registering the publisher on PyPI.
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz
